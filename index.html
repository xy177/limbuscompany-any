<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>随机人格生成器</title>
  <script src="./config.js"></script>
  <style>
    :root {
      --ink: #211713;
      --muted: #79665b;
      --paper: #f5ead7;
      --card: rgba(255, 251, 242, 0.91);
      --accent: #bd4a25;
      --accent-2: #205c59;
      --gold: #d89539;
      --line: rgba(73, 45, 31, 0.22);
      --shadow: 0 24px 80px rgba(67, 39, 24, 0.20);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Noto Serif SC", "Source Han Serif SC", "Microsoft YaHei", serif;
      background:
        radial-gradient(circle at 18% 12%, rgba(189, 74, 37, 0.22), transparent 28rem),
        radial-gradient(circle at 82% 7%, rgba(32, 92, 89, 0.20), transparent 25rem),
        linear-gradient(135deg, #e8cfaa, #f8efdf 52%, #d8b481);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.16;
      background-image:
        linear-gradient(90deg, rgba(70, 43, 29, 0.38) 1px, transparent 1px),
        linear-gradient(rgba(70, 43, 29, 0.38) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent 82%);
    }

    main {
      width: min(1160px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 42px 0 64px;
      position: relative;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 22px;
      align-items: end;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.3rem, 7vw, 5.7rem);
      letter-spacing: -0.08em;
      line-height: 0.92;
    }

    .subtitle {
      margin: 18px 0 0;
      max-width: 720px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.8;
    }

    .seal {
      display: inline-grid;
      place-items: center;
      width: 88px;
      height: 88px;
      margin-bottom: 20px;
      border: 2px solid rgba(189, 74, 37, 0.5);
      border-radius: 28px;
      color: var(--accent);
      font-size: 2.1rem;
      font-weight: 900;
      transform: rotate(-8deg);
      background: rgba(255, 245, 225, 0.52);
      box-shadow: 0 16px 38px rgba(189, 74, 37, 0.15);
    }

    .panel, .result-card, .api-card {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .panel {
      padding: 24px;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .mode {
      cursor: pointer;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.38);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .mode:has(input:checked) {
      border-color: rgba(189, 74, 37, 0.65);
      background: rgba(189, 74, 37, 0.13);
      transform: translateY(-1px);
    }

    .mode input, .pill input {
      display: none;
    }

    .mode strong {
      display: block;
      margin-bottom: 4px;
    }

    .mode span {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .systems {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0 20px;
    }

    .pill {
      cursor: pointer;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.38);
      padding: 9px 13px;
      color: var(--muted);
      transition: all 0.18s ease;
    }

    .pill:has(input:checked) {
      color: #fffaf0;
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      box-shadow: 0 10px 24px rgba(189, 74, 37, 0.22);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 13px 18px;
      color: #fff9ef;
      background: linear-gradient(135deg, var(--accent), #d2772d);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 15px 34px rgba(189, 74, 37, 0.26);
    }

    button.secondary {
      color: var(--accent-2);
      background: rgba(32, 92, 89, 0.10);
      box-shadow: none;
    }

    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .status {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .api-card {
      display: none;
      margin: 0 0 22px;
      padding: 18px;
      border-color: rgba(189, 74, 37, 0.36);
    }

    .api-card.visible {
      display: block;
    }

    .api-card label {
      display: block;
      margin-bottom: 8px;
      font-weight: 800;
    }

    .api-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .api-row input {
      flex: 1 1 360px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      font: inherit;
      background: rgba(255, 255, 255, 0.55);
    }

    .result {
      display: grid;
      gap: 16px;
      margin-top: 22px;
    }

    .result-card {
      padding: 20px;
      overflow: hidden;
    }

    .result-card h2 {
      margin: 0 0 12px;
      color: var(--accent-2);
      font-size: 1.08rem;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.65;
      font-family: "LXGW WenKai", "Microsoft YaHei", sans-serif;
      font-size: 0.95rem;
    }

    .notice {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    @media (max-width: 820px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .mode-grid {
        grid-template-columns: 1fr;
      }

      main {
        padding-top: 24px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div>
        <div class="seal">罪</div>
        <h1>随机人格<br />生成器</h1>
        <p class="subtitle">基于机器人服务器本地灰机 Wiki 人格详情缓存随机拼装。可以选择单体系、双体系，也可以指定体系组合，例如充能 + 呼吸法。</p>
      </div>
      <form class="panel" id="generator">
        <div class="mode-grid">
          <label class="mode">
            <input type="radio" name="mode" value="random" checked />
            <strong>完全随机</strong>
            <span>体系数量也随机</span>
          </label>
          <label class="mode">
            <input type="radio" name="mode" value="single" />
            <strong>单体系</strong>
            <span>只生成一种体系</span>
          </label>
          <label class="mode">
            <input type="radio" name="mode" value="dual" />
            <strong>双体系</strong>
            <span>生成两种体系</span>
          </label>
        </div>
        <div class="systems" id="systems"></div>
        <div class="actions">
          <button type="submit" id="submit">生成随机人格</button>
          <button type="button" class="secondary" id="clear">清空体系</button>
          <span class="status" id="status">等待读取服务器缓存...</span>
        </div>
        <div class="notice">提示：弹药不会单独存在；如果只选弹药，会自动补一个非弹药体系。</div>
      </form>
    </section>

    <section class="api-card" id="apiCard">
      <label for="apiBase">服务器 API 地址</label>
      <div class="api-row">
        <input id="apiBase" placeholder="例如：https://random.example.com" />
        <button type="button" class="secondary" id="saveApi">保存并重试</button>
      </div>
      <p class="notice">这个 GitHub 静态页需要读取机器人服务器 API。正式发布时应在 <code>config.js</code> 里写死 HTTPS 地址，普通访问者就不需要填写。</p>
    </section>

    <section class="result" id="result"></section>
  </main>

  <script>
    const systems = ["烧伤", "流血", "震颤", "破裂", "沉沦", "呼吸法", "充能", "弹药"];
    const apiBaseFromConfig = typeof window.RANDOM_IDENTITY_API_BASE === "string"
      ? window.RANDOM_IDENTITY_API_BASE.trim()
      : "";
    const params = new URLSearchParams(location.search);
    const apiBaseFromQuery = params.get("api") ? params.get("api").trim() : "";
    const apiBaseFromStorage = localStorage.getItem("randomIdentityApiBase") || "";
    let apiBase = normalizeApiBase(apiBaseFromQuery || apiBaseFromConfig || apiBaseFromStorage);

    const form = document.querySelector("#generator");
    const result = document.querySelector("#result");
    const statusEl = document.querySelector("#status");
    const submit = document.querySelector("#submit");
    const systemsEl = document.querySelector("#systems");
    const apiCard = document.querySelector("#apiCard");
    const apiInput = document.querySelector("#apiBase");

    systemsEl.innerHTML = systems.map((system) => `
      <label class="pill">
        <input type="checkbox" name="systems" value="${escapeHtml(system)}" />
        <span>${escapeHtml(system)}</span>
      </label>
    `).join("");

    apiInput.value = apiBase;
    document.querySelector("#clear").addEventListener("click", () => {
      document.querySelectorAll("input[name=systems]").forEach((input) => input.checked = false);
    });

    document.querySelector("#saveApi").addEventListener("click", () => {
      apiBase = normalizeApiBase(apiInput.value);
      localStorage.setItem("randomIdentityApiBase", apiBase);
      refreshHealth();
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!ensureApiBase()) {
        return;
      }

      submit.disabled = true;
      statusEl.textContent = "生成中...";
      result.innerHTML = "";
      const payload = {
        mode: new FormData(form).get("mode"),
        systems: [...document.querySelectorAll("input[name=systems]:checked")].map((input) => input.value)
      };

      try {
        const response = await fetch(apiUrl("/api/random"), {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.error || data.message || "生成失败");
        }

        const parts = Array.isArray(data.parts) && data.parts.length ? data.parts : [data.message || ""];
        result.innerHTML = parts.map((part, index) => cardHtml(index, part)).join("");
        statusEl.textContent = "生成完成" + (data.fetchedAt ? "，缓存：" + new Date(data.fetchedAt).toLocaleString() : "");
      } catch (error) {
        showError(error.message || String(error));
        statusEl.textContent = "生成失败";
      } finally {
        submit.disabled = false;
      }
    });

    refreshHealth();

    async function refreshHealth() {
      if (!ensureApiBase()) {
        return;
      }

      statusEl.textContent = "缓存状态读取中...";
      try {
        const response = await fetch(apiUrl("/api/health"), { method: "GET" });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          throw new Error(data.error || "缓存状态读取失败");
        }

        apiCard.classList.remove("visible");
        statusEl.textContent = "缓存 " + data.identitiesCount + " 条，更新时间：" + (data.fetchedAt ? new Date(data.fetchedAt).toLocaleString() : "未知");
      } catch (error) {
        apiCard.classList.add("visible");
        showError("无法连接机器人服务器 API：" + (error.message || String(error)));
        statusEl.textContent = "缓存状态读取失败";
      }
    }

    function ensureApiBase() {
      if (apiBase) {
        apiCard.classList.remove("visible");
        return true;
      }

      apiCard.classList.add("visible");
      statusEl.textContent = "未配置服务器 API 地址";
      showError("GitHub Pages 版本需要一个公网 HTTPS 服务器 API 地址。");
      return false;
    }

    function apiUrl(path) {
      return apiBase + path;
    }

    function normalizeApiBase(value) {
      return String(value || "").trim().replace(/\/+$/, "");
    }

    function cardHtml(index, text) {
      const titles = ["体系说明", "一技能", "二技能", "三技能", "守备技能"];
      return '<article class="result-card"><h2>' + (titles[index] || "结果") + '</h2><pre>' + escapeHtml(text) + '</pre></article>';
    }

    function showError(message) {
      result.innerHTML = '<article class="result-card"><h2>提示</h2><pre>' + escapeHtml(message) + '</pre></article>';
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }
  </script>
</body>
</html>
